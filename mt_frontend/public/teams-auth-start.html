<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Teams Auth</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://alcdn.msauth.net/browser/2.38.4/js/msal-browser.min.js" integrity="sha384-WbYpV2IIMwdFRWRRjZ0InqfoaOp5oH0orh4vK5m1j8ldHr2bqTrLszzbLQaGQJkv" crossorigin="anonymous"></script>
  <script src="https://res.cdn.office.net/teams-js/2.19.0/js/MicrosoftTeams.min.js"></script>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    .hidden { display:none; }
  </style>
</head>
<body>
  <h3>Signing you in...</h3>
  <div id="status">Initializing Microsoft Teams authentication...</div>
  <script>
    (async function() {
      // IMPORTANT: Use the SAME SPA clientId as in authConfig.js to avoid tenant / consent mismatch.
      const clientId = "f6c2a5e9-3bd5-4223-ad2c-618846a668c5"; // SPA Frontend App Registration
      const authority = "https://login.microsoftonline.com/7b967b11-c0b9-402b-b483-d694f50dfb82"; // tenant-specific for consistency
      const msalConfig = {
        auth: {
          clientId,
          authority,
          redirectUri: window.location.origin + "/teams-auth-start.html"
        },
        cache: { cacheLocation: "sessionStorage" },
        system: { allowRedirectInIframe: true }
      };
      const msalInstance = new msal.PublicClientApplication(msalConfig);
      await msalInstance.initialize();

      function update(msg) {
        const el = document.getElementById("status");
        if (el) el.textContent = msg;
        console.log("[TeamsAuthPopup]", msg);
      }

      // Hard timeout so the parent window isn't left waiting forever
      const failSafe = setTimeout(() => {
        update("Timeout waiting for SSO – switching to interactive login...");
      }, 6000);

      try {
        await microsoftTeams.app.initialize();
      } catch (e) {
        clearTimeout(failSafe);
        return microsoftTeams.authentication.notifyFailure("Teams init failed: " + (e.message || e));
      }

      // Attempt Teams SSO first. In a popup opened via authentication.authenticate this may fail quickly.
      let returned = false;
      try {
        const ssoToken = await microsoftTeams.authentication.getAuthToken({ silent: true });
        clearTimeout(failSafe);
        update("Obtained Teams SSO token.");
        returned = true;
        return microsoftTeams.authentication.notifySuccess(ssoToken);
      } catch (ssoErr) {
        update("Silent Teams SSO not available (" + (ssoErr?.message || ssoErr) + ") – using MSAL interactive...");
      }

      // Interactive MSAL login as fallback
      try {
        const resp = await msalInstance.loginPopup({
          scopes: ["openid", "profile", "offline_access", "User.Read"],
          prompt: "select_account"
        });
        clearTimeout(failSafe);
        if (!returned) {
          update("Login complete.");
          return microsoftTeams.authentication.notifySuccess(resp.idToken);
        }
      } catch (e) {
        clearTimeout(failSafe);
        console.error("Interactive login failed", e);
        return microsoftTeams.authentication.notifyFailure("Interactive login failed: " + (e.message || e));
      }
    })();
  </script>
</body>
</html>
